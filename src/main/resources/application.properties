spring.application.name=fgasdk
server.port=8080

# ?? OpenFGA SDK configuration ?????????????????????????????????????????????????
# When running via Docker Compose the OPENFGA_API_URL env var is injected by
# compose.yaml and points to the 'openfga' service name.
# When running locally on the host it falls back to localhost:8082.
openfga.api-url=${OPENFGA_API_URL:http://localhost:8082}
openfga.store-id=${OPENFGA_STORE_ID:}
openfga.model-id=${OPENFGA_MODEL_ID:}
# Optional: pre-shared key token (leave empty if auth is disabled)
openfga.api-token=${OPENFGA_API_TOKEN:}

# Auto-seed demo data on startup (set to false after first run if you persist state)
openfga.seed-data=true
